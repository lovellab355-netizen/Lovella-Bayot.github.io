<!DOCTYPE html>
<html>
<head>
    <title>Lovella Bayot | Portfolio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f4f4;
        }

        header {
            background: #001f3f;
            color: white;
            padding: 30px;
            text-align: center;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            padding: 20px;
            gap: 20px;
        }

        .left-column, .right-column {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .left-column {
            flex: 1;
            min-width: 250px;
        }

        .right-column {
            flex: 2;
            min-width: 300px;
        }

        h1, h2, h3 {
            margin: 0 0 10px 0;
        }

        .profile-pic {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            display: block;
            margin: 0 auto 20px;
        }

        .experience, .skills {
            margin-bottom: 15px;
        }

        hr {
            border: 0;
            height: 1px;
            background: #ccc;
            margin: 20px 0;
        }

        ul {
            padding-left: 20px;
        }
    </style>
</head>
<body>

<header>
    <img src="your-photo.jpg" alt="Lovella Bayot" class="profile-pic">
    <h1>Lovella Bayot</h1>
</header>

<div class="container">
    <!-- Left Column -->
    <div class="left-column">
        <h2>Profile</h2>
        <p>Brief description about yourself goes here.</p>

        <hr>

        <h2>Skills</h2>
        <div class="skills">
            <ul>
                <li>Skill 1</li>
                <li>Skill 2</li>
                <li>Skill 3</li>
            </ul>
        </div>
    </div>

    <!-- Right Column -->
    <div class="right-column">
        <h2>Experience</h2>
        <div class="experience">
            <h3>Job Title 1</h3>
            <p>Company Name | Date Range</p>
            <p>Job description goes here.</p>
        </div>
        <div class="experience">
            <h3>Job Title 2</h3>
            <p>Company Name | Date Range</p>
            <p>Job description goes here.</p>
        </div>
    </div>
</div>

</body>
</html>
