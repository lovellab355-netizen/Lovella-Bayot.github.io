<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lovella Bayot | Portfolio</title>
  <style>
    body {
      font-family: 'Poppins', Arial, sans-serif;
      margin: 0;
      background-color: #f9f9f9;
      color: #333;
      line-height: 1.6;
      scroll-behavior: smooth;
    }

    /* Navigation */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 50px;
      background-color: #fff;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    nav .logo {
      font-size: 1.5rem;
      font-weight: bold;
      color: #c00;
    }
    nav ul {
      list-style: none;
      display: flex;
      gap: 25px;
      margin: 0;
      padding: 0;
    }
    nav ul li a {
      text-decoration: none;
      color: #555;
      font-weight: 500;
      transition: all 0.3s ease;
    }
    nav ul li a:hover,
    nav ul li a.active {
      color: #00aaff;
      border-bottom: 2px solid #00aaff;
      padding-bottom: 2px;
    }

    /* Sections */
    section {
      max-width: 1200px;
      margin: 60px auto;
      padding: 0 20px;
    }

    /* About Section */
    .about {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 50px;
    }
    .about-text { flex: 1; }
    .about-text h2 {
      color: #c00;
      font-size: 2.2rem;
      margin-bottom: 20px;
    }
    .about-text p { color: #555; margin-bottom: 20px; }
    .about-text .btn {
      display: inline-block;
      background-color: #00aaff;
      color: #fff;
      padding: 10px 20px;
      border-radius: 5px;
      text-decoration: none;
      font-weight: 500;
      transition: background 0.3s ease;
    }
    .about-text .btn:hover { background-color: #0088cc; }
    .about-image { flex: 1; text-align: center; }
    .about-image img {
      width: 100%;
      max-width: 400px;
      border-radius: 10px;
      object-fit: cover;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
