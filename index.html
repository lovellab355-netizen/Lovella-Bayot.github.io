  <style>
    body {
      font-family: 'Poppins', Arial, sans-serif;
      margin: 0;
      background-color: #f9f9f9;
      color: #333;
      line-height: 1.6;
      scroll-behavior: smooth;
    }

    /* Navigation */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 40px;
      background-color: #fff;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    nav .logo {
      font-size: 1.5rem;
      font-weight: bold;
      color: #c00;
    }
    nav ul {
      list-style: none;
      display: flex;
      gap: 25px;
      margin: 0;
      padding: 0;
    }
    nav ul li a {
      text-decoration: none;
      color: #555;
      font-weight: 500;
      transition: all 0.3s ease;
    }
    nav ul li a:hover,
    nav ul li a.active {
      color: #00aaff;
      border-bottom: 2px solid #00aaff;
      padding-bottom: 2px;
    }

    /* Sections */
    section {
      max-width: 1100px;
      margin: 60px auto;
      padding: 0 20px;
    }

    /* About */
    .about {
      display: flex;
      align-items: center;
      gap: 40px;
    }
    .about-text { flex: 1; }
    .about-text h2 {
      color: #c00;
      font-size: 2rem;
      margin-bottom: 20px;
